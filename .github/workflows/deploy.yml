name: Continuous Deployment CD

on:
  push:
    branches: [main, master]

jobs:
  deploy:
    name: Production Release & Canary Rollout
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Docker Registry
        uses: docker/login-action@v3
        with:
          registry: registry.example.com
          username: ${{ secrets.DOCKER_REGISTRY_USERNAME }}
          password: ${{ secrets.DOCKER_REGISTRY_PASSWORD }}

      - name: Build and Push Backend Production Image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: backend/Dockerfile
          push: true
          tags: |
            registry.example.com/shadiro-backend:${{ github.sha }}
            registry.example.com/shadiro-backend:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Build and Push Frontend Production Image
        uses: docker/build-push-action@v5
        with:
          context: ./frontend
          file: ./frontend/Dockerfile
          push: true
          tags: |
            registry.example.com/shadiro-frontend:${{ github.sha }}
            registry.example.com/shadiro-frontend:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Configure AWS Credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ap-south-1

      - name: Set up EKS Kubeconfig
        run: |
          aws eks update-kubeconfig --name shadiro-production --region ap-south-1

      - name: Run Production Deployment Script
        env:
          GOOGLE_MAPS_API_KEY: ${{ secrets.GOOGLE_MAPS_API_KEY }}
          FIREBASE_PROJECT_ID: ${{ secrets.FIREBASE_PROJECT_ID }}
          REDIS_ENDPOINT: ${{ secrets.REDIS_ENDPOINT }}
          MONGODB_URI: ${{ secrets.MONGODB_URI }}
        run: |
          chmod +x ./deploy.sh
          ./deploy.sh
