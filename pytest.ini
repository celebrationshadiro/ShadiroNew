[pytest]
# Pytest configuration for Shadiro Phase 3 tests

asyncio_mode = auto
testpaths = tests
python_files = test_*.py conftest.py
python_classes = Test*
python_functions = test_*

# Mark async tests
markers =
    asyncio: marks tests as async
    integration: marks tests as integration tests
    e2e: marks tests as end-to-end tests
    emergency: marks tests related to emergency workflows
    recommendations: marks tests related to AI recommendations

# Test output
addopts = 
    -v
    --strict-markers
    --tb=short
    --disable-warnings
    -ra

# Coverage
[coverage:run]
source = backend
omit = 
    backend/__pycache__/*
    backend/migrations/*

[coverage:report]
exclude_lines =
    pragma: no cover
    def __repr__
    raise AssertionError
    raise NotImplementedError
    if __name__ == .__main__.:
    if TYPE_CHECKING:
    @abstractmethod
