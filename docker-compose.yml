version: '3.8'

services:
  # MongoDB Database
  mongodb:
    image: mongo:4.4
    container_name: shadiro-mongo
    restart: unless-stopped
    environment:
      MONGO_INITDB_ROOT_USERNAME: ${MONGO_ROOT_USER:-admin}
      MONGO_INITDB_ROOT_PASSWORD: ${MONGO_ROOT_PASSWORD:-password}
    ports:
      - "27017:27017"
    volumes:
      - mongo_data:/data/db
    deploy:
      resources:
        limits:
          cpus: '1.0'
          memory: 1G
    healthcheck:
      test: ["CMD", "mongo", "--eval", "db.adminCommand('ping')"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: shadiro-redis
    restart: unless-stopped
    command: ["redis-server", "--appendonly", "yes", "--maxmemory-policy", "allkeys-lru"]
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    deploy:
      resources:
        limits:
          cpus: '0.5'
          memory: 256M
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  # Backend API Server
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: shadiro-backend
    restart: unless-stopped
    ports:
      - "8000:8000"
    environment:
      MONGO_URL: mongodb://${MONGO_ROOT_USER:-admin}:${MONGO_ROOT_PASSWORD:-password}@mongodb:27017/?authSource=admin
      DB_NAME: shadiro_db
      JWT_SECRET_KEY: ${JWT_SECRET_KEY:-kxLy83nsTkFyxMqaNfL0kS9gidAQjegoPNt3Imcr+OU=}
      ALLOWED_ORIGINS: ${ALLOWED_ORIGINS:-https://shadiro.com,https://www.shadiro.com,http://localhost,http://localhost:80,http://localhost:3000}
      CORS_ORIGINS: ${CORS_ORIGINS:-https://shadiro.com,https://www.shadiro.com,http://localhost,http://localhost:80,http://localhost:3000}
      REDIS_URL: redis://redis:6379/0
      RAZORPAY_KEY_ID: ${RAZORPAY_KEY_ID:-}
      RAZORPAY_KEY_SECRET: ${RAZORPAY_KEY_SECRET:-}
      RAZORPAY_WEBHOOK_SECRET: ${RAZORPAY_WEBHOOK_SECRET:-}
      RAZORPAY_PAYOUT_ACCOUNT_NUMBER: ${RAZORPAY_PAYOUT_ACCOUNT_NUMBER:-}
      RESEND_API_KEY: ${RESEND_API_KEY:-}
      CLOUDINARY_NAME: ${CLOUDINARY_NAME:-}
      CLOUDINARY_API_KEY: ${CLOUDINARY_API_KEY:-}
      CLOUDINARY_API_SECRET: ${CLOUDINARY_API_SECRET:-}
    depends_on:
      mongodb:
        condition: service_healthy
      redis:
        condition: service_healthy
    deploy:
      resources:
        limits:
          cpus: '1.5'
          memory: 1G
    security_opt:
      - no-new-privileges:true
    volumes:
      - ./backend:/app
    command: uvicorn main:app --host 0.0.0.0 --port 8000
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

  # Frontend React App
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        REACT_APP_BACKEND_URL: ${REACT_APP_BACKEND_URL:-http://localhost:8000}
        REACT_APP_API_URL: ${REACT_APP_API_URL:-http://localhost:8000}
    container_name: shadiro-frontend
    restart: unless-stopped
    ports:
      - "80:80"
    environment:
      REACT_APP_BACKEND_URL: ${REACT_APP_BACKEND_URL:-http://localhost:8000}
      REACT_APP_API_URL: ${REACT_APP_API_URL:-http://localhost:8000}
    depends_on:
      - backend
    volumes:
      - ./frontend/nginx.conf:/etc/nginx/conf.d/default.conf:ro
      - ./frontend/build:/usr/share/nginx/html
    healthcheck:
      test: curl -f http://localhost/health || exit 1
      interval: 30s
      timeout: 10s
      retries: 3

  # MongoDB metrics exporter
  mongodb-exporter:
    image: percona/mongodb_exporter:0.40.0
    container_name: shadiro-mongodb-exporter
    restart: unless-stopped
    ports:
      - "9216:9216"
    command:
      - "--mongodb.uri=mongodb://${MONGO_ROOT_USER:-admin}:${MONGO_ROOT_PASSWORD:-password}@mongodb:27017/admin?authSource=admin"
      - "--collect-all"
    depends_on:
      mongodb:
        condition: service_healthy

  # Prometheus
  prometheus:
    image: prom/prometheus:v2.54.1
    container_name: shadiro-prometheus
    restart: unless-stopped
    ports:
      - "9090:9090"
    volumes:
      - ./backend/monitoring/prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - ./backend/monitoring/prometheus/alerts.yml:/etc/prometheus/alerts.yml:ro
    depends_on:
      - backend
      - alertmanager
      - mongodb-exporter

  # Alertmanager
  alertmanager:
    image: prom/alertmanager:v0.27.0
    container_name: shadiro-alertmanager
    restart: unless-stopped
    ports:
      - "9093:9093"
    volumes:
      - ./backend/monitoring/alertmanager/alertmanager.yml:/etc/alertmanager/alertmanager.yml:ro

volumes:
  mongo_data:
    driver: local
  redis_data:
    driver: local

networks:
  default:
    name: shadiro-network
