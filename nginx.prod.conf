user nginx;
worker_processes auto;
error_log /var/log/nginx/error.log warn;
pid /var/run/nginx.pid;

events {
    worker_connections 1024;
}

http {
    include /etc/nginx/mime.types;
    default_type application/octet-stream;

    log_format main '$remote_addr - $remote_user [$time_local] "$request" '
                      '$status $body_bytes_sent "$http_referer" '
                      '"$http_user_agent" "$http_x_forwarded_for"';

    access_log /var/log/nginx/access.log main;

    sendfile on;
    tcp_nopush on;
    tcp_nodelay on;
    keepalive_timeout 65;
    types_hash_max_size 2048;

    upstream backend_api {
        least_conn;
        server backend-1:8000 max_fails=3 fail_timeout=10s;
        server backend-2:8000 max_fails=3 fail_timeout=10s;
        server backend-3:8000 max_fails=3 fail_timeout=10s;
    }

    upstream backend_ws {
        ip_hash;
        server backend-1:8000 max_fails=3 fail_timeout=10s;
        server backend-2:8000 max_fails=3 fail_timeout=10s;
        server backend-3:8000 max_fails=3 fail_timeout=10s;
    }

    server {
        listen 80;
        server_name localhost shadiro.com www.shadiro.com;

        # Standard API and other HTTP requests
        location / {
            proxy_pass http://backend_api;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_connect_timeout 5s;
            proxy_read_timeout 60s;
        }

        # WebSocket channel routes (sticky sessions via ip_hash)
        location /ws/ {
            proxy_pass http://backend_ws;
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection "Upgrade";
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_read_timeout 86400s; # Keep WebSocket connection open
            proxy_send_timeout 86400s;
        }
    }
}
