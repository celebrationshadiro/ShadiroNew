global:
  scrape_interval: 15s
  evaluation_interval: 15s

rule_files:
  - /etc/prometheus/alerts.yml

alerting:
  alertmanagers:
    - static_configs:
        - targets:
            - alertmanager:9093

scrape_configs:
  - job_name: backend-fastapi
    metrics_path: /metrics
    static_configs:
      - targets:
          - backend:8000
        labels:
          service: backend

  # Enable when mongodb_exporter is running in the same Docker network.
  - job_name: mongodb
    static_configs:
      - targets:
          - mongodb-exporter:9216
        labels:
          service: mongodb
