global:
  scrape_interval: 15s
  evaluation_interval: 15s

rule_files:
  - /etc/prometheus/alerts.yml

alerting:
  alertmanagers:
    - static_configs:
        - targets:
            - alertmanager:9093

scrape_configs:
  - job_name: backend-fastapi
    metrics_path: /metrics
    static_configs:
      - targets:
          - backend-1:8000
          - backend-2:8000
          - backend-3:8000
        labels:
          service: backend

  - job_name: mongodb
    static_configs:
      - targets:
          - mongodb-exporter:9216
        labels:
          service: mongodb

  - job_name: redis
    static_configs:
      - targets:
          - redis-exporter:9121
        labels:
          service: redis
